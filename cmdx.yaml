---
# yaml-language-server: $schema=https://raw.githubusercontent.com/suzuki-shunsuke/cmdx/v2.0.2/json-schema/cmdx.json
# the configuration file of cmdx - task runner
# https://github.com/suzuki-shunsuke/cmdx
tasks:
  - name: scaffold
    short: s
    usage: "[DEPRECATED] Use argd scaffold instead"
    description: "[DEPRECATED] Use argd scaffold instead"
    quiet: true
    require:
      exec:
        - docker
    flags:
      - name: recreate
        short: r
        type: bool
      - name: no-create-branch
        short: B
        type: bool
      - name: cmd
        type: string
      - name: limit
        type: string
        short: l
      - name: config
        short: c
        type: string
    script: |
      echo "DEPRECATED: Use argd scaffold instead"
      if ! command -v argd >/dev/null 2>&1; then
        if command -v aqua >/dev/null 2>&1; then
          aqua i -l
        fi
      fi
      exit 1
    args:
      - name: package

  - name: test
    short: t
    usage: "[DEPRECATED] Use argd test instead"
    description: "[DEPRECATED] Use argd test instead"
    quiet: true
    require:
      exec:
        - docker
    flags:
      - name: recreate
        short: r
        type: bool
    args:
      - name: package
    script: |
      echo "DEPRECATED: Use argd test instead"
      if ! command -v argd >/dev/null 2>&1; then
        if command -v aqua >/dev/null 2>&1; then
          aqua i -l
        fi
      fi
      exit 1

  - name: connect
    short: con
    usage: "[DEPRECATED] Use argd con instead"
    description: "[DEPRECATED] Use argd con instead"
    quiet: true
    require:
      exec:
        - docker
    args:
      - name: os
        required: false
        default: linux
      - name: arch
        required: false
    script: |
      echo "DEPRECATED: Use argd con instead"
      if ! command -v argd >/dev/null 2>&1; then
        if command -v aqua >/dev/null 2>&1; then
          aqua i -l
        fi
      fi
      exit 1

  - name: generate-registry
    short: gr
    usage: "[DEPRECATED] Use argd gr instead"
    description: "[DEPRECATED] Use argd gr instead"
    quiet: true
    script: |
      echo "DEPRECATED: Use argd gr instead"
      if ! command -v argd >/dev/null 2>&1; then
        if command -v aqua >/dev/null 2>&1; then
          aqua i -l
        fi
      fi
      exit 1

  - name: new
    usage: "[DEPRECATED] Use argd new instead"
    description: "[DEPRECATED] Use argd new instead"
    quiet: true
    script: |
      echo "DEPRECATED: Use argd new instead"
      if ! command -v argd >/dev/null 2>&1; then
        if command -v aqua >/dev/null 2>&1; then
          aqua i -l
        fi
      fi
      exit 1
    args:
      - name: package

  - name: stop
    usage: "[DEPRECATED] Use argd stop instead"
    description: "[DEPRECATED] Use argd stop instead"
    quiet: true
    require:
      exec:
        - docker
    script: |
      echo "DEPRECATED: Use argd stop instead"
      if ! command -v argd >/dev/null 2>&1; then
        if command -v aqua >/dev/null 2>&1; then
          aqua i -l
        fi
      fi
      exit 1

  - name: remove
    short: rm
    usage: "[DEPRECATED] Use argd rm instead"
    description: "[DEPRECATED] Use argd rm instead"
    quiet: true
    require:
      exec:
        - docker
    script: |
      echo "DEPRECATED: Use argd remove instead"
      if ! command -v argd >/dev/null 2>&1; then
        if command -v aqua >/dev/null 2>&1; then
          aqua i -l
        fi
      fi
      exit 1

  - name: remove-package
    short: rmp
    usage: "[DEPRECATED] Use argd rmp instead"
    description: "[DEPRECATED] Use argd rmp instead"
    quiet: true
    require:
      exec:
        - docker
    args:
      - name: package
    script: |
      echo "DEPRECATED: Use argd rmp instead"
      if ! command -v argd >/dev/null 2>&1; then
        if command -v aqua >/dev/null 2>&1; then
          aqua i -l
        fi
      fi
      exit 1

  - name: start
    usage: "[DEPRECATED] Use argd start instead"
    description: "[DEPRECATED] Use argd start instead"
    quiet: true
    require:
      exec:
        - docker
    flags:
      - name: recreate
        short: r
        type: bool
    script: |
      echo "DEPRECATED: Use argd start instead"
      if ! command -v argd >/dev/null 2>&1; then
        if command -v aqua >/dev/null 2>&1; then
          aqua i -l
        fi
      fi
      exit 1

  - name: resolve-conflict
    usage: "[DEPRECATED] Use argd resolve-conflict instead"
    description: "[DEPRECATED] Use argd resolve-conflict instead"
    quiet: true
    args:
      - name: pr
    script: |
      echo "DEPRECATED: Use argd resolve-conflict instead"
      if ! command -v argd >/dev/null 2>&1; then
        if command -v aqua >/dev/null 2>&1; then
          aqua i -l
        fi
      fi
      exit 1

  - name: summarize
    short: sum
    description: Summarize a given pull request
    usage: Summarize a given pull request
    args:
      - name: pr
        required: true
        script_envs:
          - PR_NUMBER
    script: |
      bash scripts/summarize.sh "$PR_NUMBER"

  - name: ls-assets
    short: lsa
    description: List asset names
    usage: List asset names
    flags:
      - name: repo
        short: r
        type: string
        usage: Repo name
        script_envs:
          - REPO
    args:
      - name: version
        required: true
        script_envs:
          - VERSION
    script: |
      REPO=${REPO#https://github.com/}
      repo=$(bash scripts/get_test_pkg.sh "$REPO")

      gh release view --json assets --jq ".assets[].name" -R "$repo" "$VERSION"

  - name: generate-copilot-instruction
    short: gci
    description: Generate copilot instruction
    usage: Generate copilot instruction
    script: |
      cd docs
      cat common_style.md guide.md pkg_yaml.md registry_yaml.md > ../.github/copilot-instructions.md
