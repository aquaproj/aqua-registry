limit: 150
container_registry:
  registry: ghcr.io
  reopsitory: aquaproj/aqua-registry
  auth:
    username: suzuki-shunsuke
templates:
  pr_body: >
    {{if .ReleaseURL}}[{{.NewVersion}}]({{.ReleaseURL}}) [compare]({{.CompareURL}}){{end}}

    This pull request was created by aqua-registry-updater.
