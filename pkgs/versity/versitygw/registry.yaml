# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: github_release
    repo_owner: versity
    repo_name: versitygw
    description: A simple to deploy but feature rich S3 object storage server for your filesystem
    version_constraint: "false"
    version_overrides:
      - version_constraint: Version == "v0.1"
        asset: versitygw.{{.OS}}
        format: raw
        supported_envs:
          - linux/amd64
          - darwin
      - version_constraint: Version == "v0.4"
        asset: versitygw.{{.OS}}_{{.Arch}}.linux
        format: raw
        rosetta2: true
        replacements:
          amd64: x86_64
        overrides:
          - goos: darwin
            asset: versitygw.{{.OS}}_{{.Arch}}.darwin
        supported_envs:
          - linux/amd64
          - darwin
      - version_constraint: Version == "v0.5"
        asset: versitygw.{{.OS}}_{{.Arch}}
        format: raw
        rosetta2: true
        replacements:
          amd64: x86_64
        supported_envs:
          - linux/amd64
          - darwin
      - version_constraint: Version == "v0.14"
        asset: versitygw_.{{.Version}}_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        files:
          - name: versitygw
            src: cmd/versitygw
        replacements:
          amd64: x86_64
          darwin: Darwin
          linux: Linux
        checksum:
          enabled: false # checksums.txt has broken asset names for v0.14
        supported_envs:
          - linux
          - darwin
      - version_constraint: semver("<= 0.3.0")
        asset: versitygw.{{.OS}}_{{.Arch}}
        format: raw
        rosetta2: true
        replacements:
          amd64: x86_64
        supported_envs:
          - linux/amd64
          - darwin
      - version_constraint: semver("<= 0.13.0")
        asset: versitygw_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        files:
          - name: versitygw
            src: cmd/versitygw
        replacements:
          amd64: x86_64
          darwin: Darwin
          linux: Linux
        checksum:
          type: github_release
          asset: checksums.txt
          algorithm: sha256
        supported_envs:
          - linux
          - darwin
      - version_constraint: semver("<= 1.3.0")
        asset: versitygw_{{.Version}}_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        files:
          - name: versitygw
            src: versitygw_{{.Version}}_{{.OS}}_{{.Arch}}/versitygw
        replacements:
          amd64: x86_64
          darwin: Darwin
          linux: Linux
        checksum:
          type: github_release
          asset: checksums.txt
          algorithm: sha256
        supported_envs:
          - linux
          - darwin
      - version_constraint: "true"
        asset: versitygw_{{.Version}}_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        files:
          - name: versitygw
            src: versitygw_{{.Version}}_{{.OS}}_{{.Arch}}/versitygw
        replacements:
          amd64: x86_64
          darwin: Darwin
          linux: Linux
          windows: Windows
        checksum:
          type: github_release
          asset: checksums.txt
          algorithm: sha256
        overrides:
          - goos: windows
            format: zip
            files:
              - name: versitygw
                src: versitygw_{{.Version}}_{{.OS}}_{{.Arch}}/versitygw
