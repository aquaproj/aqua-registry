# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - name: glossia.ai/cli
    type: http
    aliases:
      - name: glossia/cli
    description: Localize like you ship software
    files:
      - name: glossia
    version_constraint: "false"
    version_overrides:
      - version_constraint: semver("< 0.15.1")
        version_prefix: cli-v
        type: http
        windows_arm_emulation: true
        url: https://glossia-releases.t3.storage.dev/cli/{{.SemVer}}/glossia-{{.OS}}-{{.Arch}}.{{.Format}}
        replacements:
          amd64: x64
        format: tar.gz
        overrides:
          - goos: windows
            format: zip
        checksum:
          type: http
          url: https://glossia-releases.t3.storage.dev/cli/{{.SemVer}}/SHA256SUMS
          algorithm: sha256
      - version_constraint: "true"
        version_prefix: cli-v
        type: http
        windows_arm_emulation: true
        url: https://releases.glossia.ai/cli/{{.SemVer}}/glossia-{{.OS}}-{{.Arch}}.{{.Format}}
        replacements:
          amd64: x64
        format: tar.gz
        overrides:
          - goos: windows
            format: zip
        checksum:
          type: http
          url: https://releases.glossia.ai/cli/{{.SemVer}}/SHA256SUMS
          algorithm: sha256
