# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: github_release
    repo_owner: FairwindsOps
    repo_name: polaris
    description: Validation of best practices in your Kubernetes clusters
    version_constraint: "false"
    version_overrides:
      - version_constraint: semver("< 10.2.0")
        asset: polaris_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        checksum:
          type: github_release
          asset: checksums.txt
          algorithm: sha256
      - version_constraint: "true"
        asset: polaris_{{trimV .Version}}_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        supported_envs:
          - darwin
          - linux
          - windows/amd64
        checksum:
          type: github_release
          asset: checksums.txt
          algorithm: sha256
          cosign:
            bundle:
              type: github_release
              asset: checksums.txt.sigstore.json
            opts:
              - --key
              - https://artifacts.fairwinds.com/cosign-p256.pub
