# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: http
    repo_owner: fwdcloudsec
    repo_name: granted
    aliases:
      - name: common-fate/granted
    description: The easiest way to access your cloud
    version_constraint: "false"
    version_overrides:
      - version_constraint: semver("< 0.37.0")
        url: https://releases.commonfate.io/granted/{{.Version}}/granted_{{trimV .Version}}_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        files:
          - name: granted
          - name: assume
          - name: assumego
        replacements:
          amd64: x86_64
        overrides:
          - goos: windows
            format: zip
          - goos: darwin
            files:
              - name: granted
              - name: assume
              - name: assumego
                src: granted
                link: assumego
      - version_constraint: semver("< 0.39.0")
        url: https://releases.granted.dev/granted/{{.Version}}/granted_{{trimV .Version}}_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        files:
          - name: granted
          - name: assume
          - name: assumego
        replacements:
          amd64: x86_64
        overrides:
          - goos: windows
            format: zip
          - goos: darwin
            files:
              - name: granted
              - name: assume
              - name: assumego
                src: granted
                link: assumego
      - version_constraint: "true"
        url: https://releases.granted.dev/granted/{{.Version}}/granted_{{trimV .Version}}_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        files:
          - name: granted
          - name: assume
          - name: assumego
        replacements:
          amd64: x86_64
        supported_envs:
          - linux
          - windows
        overrides:
          - goos: windows
            format: zip
