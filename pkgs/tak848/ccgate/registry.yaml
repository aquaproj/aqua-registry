# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: github_release
    repo_owner: tak848
    repo_name: ccgate
    description: LLM-powered PermissionRequest hook for Claude Code
    version_constraint: "false"
    version_overrides:
      - version_constraint: "true"
        asset: ccgate-{{.OS}}-{{.Arch}}.{{.Format}}
        format: tar.gz
        checksum:
          type: github_release
          asset: checksums.txt
          algorithm: sha256
        supported_envs:
          - linux
          - darwin
