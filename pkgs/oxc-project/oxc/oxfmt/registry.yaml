    type: github_release
    repo_owner: oxc-project
    repo_name: oxc
    description: A collection of high-performance JavaScript tools
    version_constraint: "false"
    version_overrides:
      - version_constraint: Version == "v0.0.0-alpha.0"
        asset: oxc-{{.OS}}-{{.Arch}}
        format: raw
        replacements:
          amd64: x64
          windows: win32
      - version_constraint: Version == "v0.0.0-alpha.1"
        asset: oxc-{{.OS}}-{{.Arch}}.{{.Format}}
