# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: github_release
    repo_owner: cachix
    repo_name: secretspec
    description: Declare secrets once. Store them anywhere
    version_constraint: "false"
    version_overrides:
      - version_constraint: Version == "v0.2.0"
        asset: secretspec-{{.Arch}}-{{.OS}}.{{.Format}}
        format: tar.xz
        windows_arm_emulation: true
        files:
          - name: secretspec
            src: secretspec-{{.Arch}}-{{.OS}}/secretspec
        replacements:
          amd64: x86_64
          darwin: apple-darwin
          linux: unknown-linux-gnu
          windows: pc-windows-msvc
        checksum:
          type: github_release
          asset: "{{.Asset}}.sha256"
          algorithm: sha256
        overrides:
          - goos: darwin
            replacements:
              arm64: aarch64
          - goos: windows
            format: zip
            files:
              - name: secretspec
        supported_envs:
          - darwin
          - windows
          - amd64
      - version_constraint: "true"
        asset: secretspec-{{.Arch}}-{{.OS}}.{{.Format}}
        format: tar.xz
        windows_arm_emulation: true
        files:
          - name: secretspec
            src: secretspec-{{.Arch}}-{{.OS}}/secretspec
        replacements:
          amd64: x86_64
          arm64: aarch64
          darwin: apple-darwin
          linux: unknown-linux-gnu
          windows: pc-windows-msvc
        checksum:
          type: github_release
          asset: "{{.Asset}}.sha256"
          algorithm: sha256
        overrides:
          - goos: windows
            format: zip
            files:
              - name: secretspec
