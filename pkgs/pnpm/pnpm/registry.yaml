# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: github_release
    repo_owner: pnpm
    repo_name: pnpm
    description: Fast, disk space efficient package manager
    version_constraint: "false"
    version_overrides:
      - version_constraint: semver("<= 6.11.5")
        no_asset: true
      - version_constraint: semver("<= 6.12.1")
        asset: pnpm-{{.OS}}-{{.Arch}}
        format: raw
        rosetta2: true
        windows_arm_emulation: true
        replacements:
          amd64: x64
          darwin: macos
          windows: win
        supported_envs:
          - darwin
          - windows
          - amd64
      - version_constraint: semver("<= 6.16.1")
        asset: pnpm-{{.OS}}-{{.Arch}}
        format: raw
        windows_arm_emulation: true
        replacements:
          amd64: x64
          darwin: macos
          windows: win
        supported_envs:
          - darwin
          - windows
          - amd64
      - version_constraint: semver("<= 6.18.0")
        asset: pnpm-{{.OS}}-{{.Arch}}
        format: raw
        windows_arm_emulation: true
        replacements:
          amd64: x64
          darwin: macos
          windows: win
      - version_constraint: semver("<= 6.20.0")
        asset: pnpm-{{.OS}}-{{.Arch}}
        format: raw
        replacements:
          amd64: x64
        supported_envs:
          - linux/amd64
      - version_constraint: semver("<= 7.0.0-alpha.0")
        asset: pnpm-{{.OS}}-{{.Arch}}
        format: raw
        windows_arm_emulation: true
        replacements:
          amd64: x64
          darwin: macos
          windows: win
      - version_constraint: Version == "v7.0.0-alpha.1"
        no_asset: true
      - version_constraint: semver("<= 10.26.1")
        asset: pnpm-{{.OS}}-{{.Arch}}
        format: raw
        windows_arm_emulation: true
        files:
          - name: pnpm
            link: pnpm
            hard: true
        replacements:
          amd64: x64
          darwin: macos
          windows: win
      - version_constraint: semver("< 11.0.0")
        asset: pnpm-{{.OS}}-{{.Arch}}
        format: raw
        windows_arm_emulation: true
        files:
          - name: pnpm
            link: pnpm
            hard: true
        replacements:
          amd64: x64
          darwin: macos
          windows: win
      - version_constraint: semver("<= 11.0.4")
        asset: pnpm-{{.OS}}-{{.Arch}}.{{.Format}}
        format: tar.gz
        files:
          - name: pnpm
          - name: pn
            src: pnpm
            link: pn
        replacements:
          amd64: x64
          windows: win32
        overrides:
          - goos: windows
            format: zip
      - version_constraint: semver("<= 11.0.6")
        asset: pnpm-{{.OS}}-{{.Arch}}.{{.Format}}
        format: tar.gz
        files:
          - name: pnpm
          - name: pn
            src: pnpm
            link: pn
        replacements:
          amd64: x64
          windows: win32
        overrides:
          - goos: windows
            format: zip
        github_artifact_attestations:
          signer_workflow: pnpm/pnpm/\.github/workflows/release\.yml
        supported_envs:
          - linux
          - windows
          - darwin/arm64
      - version_constraint: "true"
        asset: pnpm-{{.OS}}-{{.Arch}}.{{.Format}}
        format: tar.gz
        files:
          - name: pnpm
          - name: pn
            src: pnpm
            link: pn
          - name: pnpx
            src: pnpm
            link: pnpx
            hard: true
          - name: pnx
            src: pnpm
            link: pnx
            hard: true
        replacements:
          amd64: x64
          windows: win32
        overrides:
          - goos: windows
            format: zip
        github_artifact_attestations:
          signer_workflow: pnpm/pnpm/\.github/workflows/release\.yml
        supported_envs:
          - linux
          - windows
          - darwin/arm64
