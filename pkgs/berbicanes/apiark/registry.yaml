# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: github_release
    repo_owner: berbicanes
    repo_name: apiark
    description: Privacy-first API platform built with Tauri v2. No login, no cloud, ~60 MB RAM. A lightweight Postman alternative
    version_constraint: "false"
    version_overrides:
      - version_constraint: Version == "v0.2.11"
        asset: apiark-cli-{{.OS}}-{{.Arch}}
        format: raw
        windows_arm_emulation: true
        replacements:
          amd64: x86_64
          darwin: macos
        supported_envs:
          - darwin
          - windows
          - amd64
      - version_constraint: Version == "v0.2.13"
        asset: apiark-cli-{{.OS}}-{{.Arch}}
        format: raw
        windows_arm_emulation: true
        replacements:
          amd64: x64
        overrides:
          - goos: linux
            replacements:
              amd64: x86_64
          - goos: darwin
            format: dmg
            asset: ApiArk_{{trimV .Version}}_{{.Arch}}.{{.Format}}
            replacements:
              arm64: aarch64
          - goos: windows
            asset: ApiArk_{{trimV .Version}}_{{.Arch}}-setup
        supported_envs:
          - darwin
          - windows
          - amd64
      - version_constraint: Version == "v0.2.14"
        asset: apiark-cli-{{.OS}}-{{.Arch}}
        format: raw
        windows_arm_emulation: true
        replacements:
          amd64: x86_64
          darwin: macos
        supported_envs:
          - darwin
          - windows
          - amd64
      - version_constraint: Version == "v0.2.19"
        asset: apiark-cli-{{.OS}}-{{.Arch}}
        format: raw
        windows_arm_emulation: true
        replacements:
          amd64: x86_64
        overrides:
          - goos: darwin
            format: dmg
            asset: ApiArk_{{trimV .Version}}_{{.Arch}}.{{.Format}}
            replacements:
              amd64: x64
              arm64: aarch64
        supported_envs:
          - darwin
          - windows
          - amd64
      - version_constraint: Version == "v0.2.25"
        asset: apiark-cli-{{.OS}}-{{.Arch}}
        format: raw
        windows_arm_emulation: true
        replacements:
          amd64: x86_64
        overrides:
          - goos: darwin
            format: dmg
            asset: ApiArk_{{trimV .Version}}_{{.Arch}}.{{.Format}}
            replacements:
              amd64: x64
              arm64: aarch64
        supported_envs:
          - darwin
          - windows
          - amd64
      - version_constraint: semver("<= 0.2.10")
        asset: apiark-cli-{{.OS}}-{{.Arch}}
        format: raw
        windows_arm_emulation: true
        replacements:
          amd64: x64
        overrides:
          - goos: linux
            replacements:
              amd64: x86_64
          - goos: darwin
            format: dmg
            asset: ApiArk_{{trimV .Version}}_{{.Arch}}.{{.Format}}
            replacements:
              arm64: aarch64
          - goos: windows
            asset: ApiArk_{{trimV .Version}}_{{.Arch}}-setup
        supported_envs:
          - darwin
          - windows
          - amd64
      - version_constraint: "true"
        asset: ApiArk_{{trimV .Version}}_{{.Arch}}-setup
        format: raw
        windows_arm_emulation: true
        replacements:
          amd64: x64
        overrides:
          - goos: linux
            asset: apiark-cli-{{.OS}}-{{.Arch}}
            replacements:
              amd64: x86_64
          - goos: darwin
            format: dmg
            asset: ApiArk_{{trimV .Version}}_{{.Arch}}.{{.Format}}
            replacements:
              arm64: aarch64
        supported_envs:
          - darwin
          - windows
          - amd64
