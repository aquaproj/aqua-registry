# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: http
    name: android/ndk
    repo_owner: android
    repo_name: ndk
    description: Android Native Development Kit (NDK) for building native code
    link: https://developer.android.com/ndk
    search_words:
      - ndk-build
    version_prefix: "r"
    version_filter: not (Version contains "beta" or Version contains "rc")
    version_constraint: "false"
    version_overrides:
      - version_constraint: "true"
        url: https://dl.google.com/android/repository/android-ndk-r{{trimV .Version}}-{{.OS}}.{{.Format}}
        format: zip
        files:
          - name: ndk-build
            src: android-ndk-r{{trimV .Version}}/ndk-build
        overrides:
          - goos: windows
            files:
              - name: ndk-build
                src: android-ndk-r{{trimV .Version}}/ndk-build.cmd
    supported_envs:
      - darwin
      - linux
      - windows
