# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: github_release
    repo_owner: radiosilence
    repo_name: nano-web
    description: Ultra-fast in-memory static file server for SPAs and static content
    version_constraint: "false"
    version_overrides:
      - version_constraint: Version == "v1.0.5"
        asset: nano-web-{{.OS}}-{{.Arch}}
        format: raw
        windows_arm_emulation: true
        replacements:
          darwin: macos
      - version_constraint: semver("<= 0.12.1")
        asset: nano-web-{{.OS}}-{{.Arch}}.{{.Format}}
        format: tar.gz
        windows_arm_emulation: true
        checksum:
          type: github_release
          asset: checksums.txt
          algorithm: sha256
        overrides:
          - goos: windows
            format: zip
      - version_constraint: semver("<= 1.1.1")
        asset: nano-web-{{.OS}}-{{.Arch}}
        format: raw
        windows_arm_emulation: true
        replacements:
          darwin: macos
        supported_envs:
          - linux
          - darwin/arm64
          - windows/amd64
      - version_constraint: "true"
        asset: nano-web-{{.OS}}-{{.Arch}}
        format: raw
        windows_arm_emulation: true
        replacements:
          darwin: macos
        overrides:
          - goos: linux
            asset: nano-web-{{.OS}}-{{.Arch}}-musl
        supported_envs:
          - linux
          - darwin/arm64
          - windows/amd64
