# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: github_release
    repo_owner: goccy
    repo_name: bigquery-emulator
    description: BigQuery emulator server implemented in Go
    version_constraint: "false"
    version_overrides:
      - version_constraint: Version == "v0.1.2"
        asset: bigquery-emulator-{{.OS}}-{{.Arch}}
        format: raw
        rosetta2: true
        supported_envs:
          - darwin
      - version_constraint: semver("< 0.7.0")
        asset: bigquery-emulator-{{.OS}}-{{.Arch}}
        format: raw
        rosetta2: true
        supported_envs:
          - linux/amd64
          - darwin
      - version_constraint: "true"
        asset: bigquery-emulator_{{.Version}}_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        rosetta2: true
        overrides:
          - goos: windows
            format: zip
        github_artifact_attestations:
          signer_workflow: goccy/bigquery-emulator/\.github/workflows/release\.yml
