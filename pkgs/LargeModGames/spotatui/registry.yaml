# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: github_release
    repo_owner: LargeModGames
    repo_name: spotatui
    description: A fully standalone Spotify client for the terminal. Native streaming included, no daemon required
    version_constraint: "false"
    version_overrides:
      - version_constraint: Version == "v0.26.0"
        asset: spotatui-{{.OS}}-musl-{{.Arch}}.{{.Format}}
        format: tar.gz
        windows_arm_emulation: true
        replacements:
          amd64: x86_64
          darwin: macos
        checksum:
          type: github_release
          asset: "{{.Asset}}.sha256"
          algorithm: sha256
        overrides:
          - goos: darwin
            asset: spotatui-{{.OS}}-{{.Arch}}.{{.Format}}
            replacements:
              arm64: aarch64
          - goos: windows
            format: zip
            asset: spotatui-{{.OS}}-{{.Arch}}.{{.Format}}
        supported_envs:
          - darwin
          - windows
          - amd64
      - version_constraint: semver("<= 0.31.0")
        asset: spotatui-{{.OS}}-alpine-{{.Arch}}.{{.Format}}
        format: tar.gz
        windows_arm_emulation: true
        replacements:
          amd64: x86_64
          darwin: macos
        checksum:
          type: github_release
          asset: "{{.Asset}}.sha256"
          algorithm: sha256
        overrides:
          - goos: darwin
            asset: spotatui-{{.OS}}-{{.Arch}}.{{.Format}}
            replacements:
              arm64: aarch64
          - goos: windows
            format: zip
            asset: spotatui-{{.OS}}-{{.Arch}}.{{.Format}}
        supported_envs:
          - darwin
          - windows
          - amd64
      - version_constraint: "true"
        asset: spotatui-{{.OS}}-{{.Arch}}.{{.Format}}
        format: tar.gz
        windows_arm_emulation: true
        replacements:
          amd64: x86_64
          darwin: macos
        checksum:
          type: github_release
          asset: "{{.Asset}}.sha256"
          algorithm: sha256
        overrides:
          - goos: darwin
            replacements:
              arm64: aarch64
          - goos: windows
            format: zip
        supported_envs:
          - darwin
          - windows
          - amd64
