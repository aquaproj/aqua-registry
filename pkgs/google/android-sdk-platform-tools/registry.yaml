# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: http
    name: google/android-sdk-platform-tools
    description: Android SDK Platform-Tools including adb and fastboot
    link: https://developer.android.com/tools/releases/platform-tools
    version_constraint: "false"
    version_overrides:
      - version_constraint: "true"
        url: https://dl.google.com/android/repository/platform-tools_r{{trimV .Version}}-{{.OS}}.{{.Format}}
        format: zip
        replacements:
          windows: win
        files:
          - name: adb
            src: platform-tools/adb
          - name: fastboot
            src: platform-tools/fastboot
    search_words:
      - adb
      - fastboot
    supported_envs:
      - darwin
      - linux
      - windows
