# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: github_release
    repo_owner: slackapi
    repo_name: slack-cli
    description: Create, develop, and deploy Slack apps from the command-line
    files:
      - name: slack
    version_constraint: "false"
    version_overrides:
      - version_constraint: Version == "dev-build"
        asset: slack_cli_dev_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        windows_arm_emulation: true
        replacements:
          amd64: 64-bit
          darwin: macOS
        overrides:
          - goos: windows
            format: zip
        supported_envs:
          - darwin
          - windows
          - amd64
      - version_constraint: Version == "v3.1.0-ci-forkproof-docs-sync"
        asset: slack_cli_dev_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        rosetta2: true
        windows_arm_emulation: true
        replacements:
          amd64: 64-bit
          darwin: macOS
        overrides:
          - goos: windows
            format: zip
            asset: slack_cli_3.1.0-18-gdc7e94e_{{.OS}}_{{.Arch}}.{{.Format}}
