# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: github_release
    repo_owner: slackapi
    repo_name: slack-cli
    aliases:
      - name: slack.com/slack-cli
    description: Create, develop, and deploy Slack apps from the command-line
    files:
      - name: slack
        src: bin/slack
    version_constraint: "false"
    version_overrides:
      - version_constraint: Version == "dev-build"
        error_message: This version is not supported
      - version_constraint: semver("<= 3.2.0")
        asset: slack_cli_{{trimV .Version}}_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        rosetta2: true
        windows_arm_emulation: true
        replacements:
          amd64: 64-bit
          darwin: macOS
        overrides:
          - goos: windows
            format: zip
        supported_envs:
          - darwin
          - windows
          - amd64
      - version_constraint: "true"
        asset: slack_cli_{{trimV .Version}}_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        windows_arm_emulation: true
        replacements:
          amd64: 64-bit
          darwin: macOS
        overrides:
          - goos: windows
            format: zip
        supported_envs:
          - darwin
          - windows
          - amd64
