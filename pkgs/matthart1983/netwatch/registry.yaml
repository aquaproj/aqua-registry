# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: github_release
    repo_owner: matthart1983
    repo_name: netwatch
    description: Real-time network diagnostics in your terminal. One command, zero config, instant visibility
    version_constraint: "false"
    files:
      - name: netwatch
        src: "{{.AssetWithoutExt}}"
    version_overrides:
      - version_constraint: Version == "v0.8.0"
        no_asset: true
      - version_constraint: semver("<= 0.11.0")
        asset: netwatch-{{.OS}}-{{.Arch}}.{{.Format}}
        format: tar.gz
        windows_arm_emulation: true
        replacements:
          amd64: x86_64
          arm64: aarch64
          darwin: macos
        overrides:
          - goos: windows
            format: zip
            asset: netwatch-{{.OS}}-{{.Arch}}.exe.{{.Format}}
            replacements: {}
      - version_constraint: "true"
        asset: netwatch-{{.OS}}-{{.Arch}}-static.{{.Format}}
        format: tar.gz
        windows_arm_emulation: true
        replacements:
          amd64: x86_64
          arm64: aarch64
          darwin: macos
        overrides:
          - goos: darwin
            asset: netwatch-{{.OS}}-{{.Arch}}.{{.Format}}
          - goos: windows
            format: zip
            asset: netwatch-{{.OS}}-{{.Arch}}.exe.{{.Format}}
            replacements: {}
