# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: http
    repo_owner: apache
    repo_name: maven
    description: Apache Maven core
    version_prefix: maven-
    version_constraint: "false"
    version_filter: not (Version matches "-(rc|alpha|beta)")
    version_overrides:
      - version_constraint: semver("<= 3.2.5")
        url: https://archive.apache.org/dist/maven/maven-{{(semver .SemVer).Major}}/{{.SemVer}}/binaries/apache-maven-{{.SemVer}}-bin.{{.Format}}
        format: tar.gz
        checksum:
          type: http
          url: https://archive.apache.org/dist/maven/maven-{{(semver .SemVer).Major}}/{{.SemVer}}/binaries/apache-maven-{{.SemVer}}-bin.{{.Format}}.sha1
          file_format: regexp
          algorithm: sha1
          pattern:
            checksum: ^(\b[A-Fa-f0-9]{40}\b)
        files:
          - name: mvn
            src: apache-maven-{{.SemVer}}/bin/mvn
        overrides:
          - goos: windows
            files:
              - name: mvn
                src: apache-maven-{{.SemVer}}/bin/mvn.bat
      - version_constraint: semver("<= 3.3.1")
        url: https://archive.apache.org/dist/maven/maven-{{(semver .SemVer).Major}}/{{.SemVer}}/binaries/apache-maven-{{.SemVer}}-bin.{{.Format}}
        format: tar.gz
        checksum:
          type: http
          url: https://archive.apache.org/dist/maven/maven-{{(semver .SemVer).Major}}/{{.SemVer}}/binaries/apache-maven-{{.SemVer}}-bin.{{.Format}}.sha1
          file_format: regexp
          algorithm: sha1
          pattern:
            checksum: ^(\b[A-Fa-f0-9]{40}\b)
        files:
          - name: mvn
            src: apache-maven-{{.SemVer}}/bin/mvn
        overrides:
          - goos: windows
            files:
              - name: mvn
                src: apache-maven-{{.SemVer}}/bin/mvn.cmd
      - version_constraint: "true"
        url: https://archive.apache.org/dist/maven/maven-{{(semver .SemVer).Major}}/{{.SemVer}}/binaries/apache-maven-{{.SemVer}}-bin.{{.Format}}
        format: tar.gz
        checksum:
          type: http
          url: https://archive.apache.org/dist/maven/maven-{{(semver .SemVer).Major}}/{{.SemVer}}/binaries/apache-maven-{{.SemVer}}-bin.{{.Format}}.sha512
          file_format: regexp
          algorithm: sha512
          pattern:
            checksum: ^(\b[A-Fa-f0-9]{128}\b)
        files:
          - name: mvn
            src: apache-maven-{{.SemVer}}/bin/mvn
        overrides:
          - goos: windows
            files:
              - name: mvn
                src: apache-maven-{{.SemVer}}/bin/mvn.cmd
