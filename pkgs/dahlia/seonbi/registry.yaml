# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: github_release
    repo_owner: dahlia
    repo_name: seonbi
    description: SmartyPants for Korean language
    version_constraint: "false"
    version_overrides:
      - version_constraint: semver("<= 0.2.3")
        asset: seonbi-{{.Version}}.{{.OS}}-{{.Arch}}.{{.Format}}
        format: tar.bz2
        rosetta2: true
        replacements:
          amd64: x86_64
          darwin: macos
          windows: win64
        overrides:
          - goos: windows
            format: zip
            asset: seonbi-{{.Version}}.{{.OS}}.{{.Format}}
        supported_envs:
          - darwin
          - windows
          - amd64
      - version_constraint: semver("<= 0.4.0")
        asset: seonbi-{{.Version}}.{{.OS}}-{{.Arch}}.{{.Format}}
        format: tar.bz2
        replacements:
          amd64: x86_64
          darwin: macos
          windows: win64
        overrides:
          - goos: windows
            format: zip
            asset: seonbi-{{.Version}}.{{.OS}}.{{.Format}}
        supported_envs:
          - darwin
          - windows
          - amd64
      - version_constraint: "true"
        asset: seonbi-{{.Version}}.{{.OS}}-{{.Arch}}.{{.Format}}
        format: tar.bz2
        replacements:
          amd64: x86_64
          darwin: macos
          windows: win64
        overrides:
          - goos: windows
            format: zip
            asset: seonbi-{{.Version}}.{{.OS}}.{{.Format}}
