# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: github_release
    repo_owner: dahlia
    repo_name: submark
    description: Extract a part from CommonMark/Markdown docs
    version_constraint: "false"
    version_overrides:
      - version_constraint: Version == "0.1.0"
        asset: submark-{{.OS}}-{{.Arch}}
        format: raw
        replacements:
          amd64: x86_64
        supported_envs:
          - linux/amd64
      - version_constraint: Version == "0.2.0"
        asset: submark-{{.OS}}-{{.Arch}}
        format: raw
        replacements:
          windows: win64
        overrides:
          - goos: linux
            replacements:
              amd64: x86_64
          - goos: windows
            asset: submark-{{.OS}}
        supported_envs:
          - linux/amd64
          - windows/amd64
      - version_constraint: semver("<= 0.3.1")
        asset: submark-{{.OS}}-{{.Arch}}
        format: raw
        rosetta2: true
        replacements:
          amd64: x86_64
          windows: win64
        overrides:
          - goos: windows
            asset: submark-{{.OS}}
        supported_envs:
          - darwin
          - windows
          - amd64
      - version_constraint: "true"
        asset: submark-{{.OS}}-{{.Arch}}
        format: raw
        replacements:
          amd64: x86_64
          arm64: aarch64
          windows: win64
        overrides:
          - goos: windows
            asset: submark-{{.OS}}
