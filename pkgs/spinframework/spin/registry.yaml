# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: github_release
    repo_owner: spinframework
    repo_name: spin
    description: Developer tool for building and running serverless WebAssembly applications
    version_constraint: "false"
    version_overrides:
      - version_constraint: Version == "v0.1.0-rc.1"
        asset: spin-{{.Version}}-{{.OS}}-{{.Arch}}.{{.Format}}
        format: tar.gz
        windows_arm_emulation: true
        replacements:
          arm64: aarch64
          darwin: macos
      - version_constraint: Version == "v0.1.0-rc.4"
        asset: spin-{{.Version}}-{{.OS}}-{{.Arch}}.{{.Format}}
        format: tar.gz
        windows_arm_emulation: true
        replacements:
          arm64: aarch64
          darwin: macos
        checksum:
          type: github_release
          asset: checksums-{{.Version}}.txt
          algorithm: sha256
        supported_envs:
          - darwin
          - windows
          - amd64
      - version_constraint: semver("<= 0.6.0")
        asset: spin-{{.Version}}-{{.OS}}-{{.Arch}}.{{.Format}}
        format: tar.gz
        windows_arm_emulation: true
        replacements:
          darwin: macos
        checksum:
          type: github_release
          asset: checksums-{{.Version}}.txt
          algorithm: sha256
        overrides:
          - goos: darwin
            replacements:
              arm64: aarch64
          - goos: windows
            format: zip
        supported_envs:
          - darwin
          - windows
          - amd64
      - version_constraint: "true"
        asset: spin-{{.Version}}-{{.OS}}-{{.Arch}}.{{.Format}}
        format: tar.gz
        windows_arm_emulation: true
        replacements:
          arm64: aarch64
          darwin: macos
        checksum:
          type: github_release
          asset: checksums-{{.Version}}.txt
          algorithm: sha256
        overrides:
          - goos: windows
            format: zip
            replacements: {}
