# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: github_release
    repo_owner: CycloneDX
    repo_name: cdxgen
    description: Creates CycloneDX Bill of Materials (BOM) from source code and container images
    version_filter: (semver(">= 11.5.0")) and not (Version contains "-")
    version_constraint: "false"
    version_overrides:
      - version_constraint: semver("<= 11.9.0")
        asset: cdxgen-{{.OS}}-{{.Arch}}
        format: raw
        checksum:
          type: github_release
          asset: "{{.Asset}}.sha256"
          algorithm: sha256
      - version_constraint: semver("<= 12.0.0")
        asset: cdxgen-{{.OS}}-{{.Arch}}
        format: raw
        checksum:
          type: github_release
          asset: "{{.Asset}}.sha256"
          algorithm: sha256
        supported_envs:
          - linux
          - darwin/arm64
          - windows
      - version_constraint: "true"
        asset: cdxgen-{{.OS}}-{{.Arch}}
        format: raw
        checksum:
          type: github_release
          asset: "{{.Asset}}.sha256"
          algorithm: sha256
