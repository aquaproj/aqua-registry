# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: github_release
    repo_owner: dyoshikawa
    repo_name: rulesync
    description: A Utility CLI for AI Coding Agents
    version_constraint: "false"
    version_overrides:
      - version_constraint: Version == "v6.7.1"
        no_asset: true
      - version_constraint: semver("<= 3.14.0")
        no_asset: true
      - version_constraint: semver("<= 3.17.1")
        asset: rulesync-{{.OS}}-{{.Arch}}
        format: raw
        replacements:
          amd64: x64
        checksum:
          type: github_release
          asset: SHA256SUMS
          algorithm: sha256
        supported_envs:
          - linux
          - darwin
      - version_constraint: semver("<= 4.0.0")
        asset: rulesync-{{.OS}}-{{.Arch}}
        format: raw
        windows_arm_emulation: true
        replacements:
          amd64: x64
        checksum:
          type: github_release
          asset: SHA256SUMS
          algorithm: sha256
      - version_constraint: semver("<= 5.5.1")
        asset: rulesync-{{.OS}}-{{.Arch}}
        format: raw
        windows_arm_emulation: true
        replacements:
          amd64: x64
        checksum:
          type: github_release
          asset: SHA256SUMS
          algorithm: sha256
        supported_envs:
          - linux
          - darwin/arm64
          - windows/amd64
      - version_constraint: semver("<= 14.1.0")
        asset: rulesync-{{.OS}}-{{.Arch}}
        format: raw
        windows_arm_emulation: true
        replacements:
          amd64: x64
        checksum:
          type: github_release
          asset: SHA256SUMS
          algorithm: sha256
      - version_constraint: "true"
        asset: rulesync-{{.OS}}-{{.Arch}}
        format: raw
        windows_arm_emulation: true
        github_artifact_attestations:
          signer_workflow: dyoshikawa/rulesync/.github/workflows/publish-assets.yml
        replacements:
          amd64: x64
        checksum:
          type: github_release
          asset: SHA256SUMS
          algorithm: sha256
