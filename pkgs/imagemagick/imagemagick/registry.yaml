# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: github_release
    repo_owner: imagemagick
    repo_name: imagemagick
    description: ImageMagick is a free and open-source software suite for displaying, creating, converting, modifying, and editing raster images.
    supported_envs:
      - windows
    asset: ImageMagick-{{trimV .Version}}-portable-Q16-HDRI-{{.Arch}}.7z
    format: 7z
    replacements:
      amd64: x64
      arm64: arm64
      386: x86
    files:
      - name: compare.exe
      - name: composite.exe
      - name: conjure.exe
      - name: identify.exe
      - name: magick.exe
      - name: mogrify.exe
      - name: montage.exe
      - name: stream.exe
