# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: github_release
    repo_owner: bmf-san
    repo_name: ggc
    description: A modern Git CLI tool with both traditional command-line and interactive incremental-search UI
    version_constraint: "false"
    version_overrides:
      - version_constraint: semver("<= 3.2.1")
        no_asset: true
      - version_constraint: semver("< 8.3.0")
        asset: ggc_{{trimV .Version}}_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        checksum:
          type: github_release
          asset: ggc_{{trimV .Version}}_checksums.txt
          algorithm: sha256
      - version_constraint: semver("< 8.4.0")
        asset: ggc_{{trimV .Version}}_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        checksum:
          type: github_release
          asset: checksums.txt
          algorithm: sha256
        overrides:
          - goos: windows
            format: zip
      - version_constraint: "true"
        asset: ggc_{{trimV .Version}}_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        checksum:
          type: github_release
          asset: checksums.txt
          algorithm: sha256
          cosign:
            opts:
              - --certificate
              - https://github.com/bmf-san/ggc/releases/download/{{.Version}}/checksums.txt.pem
              - --certificate-identity
              - "https://github.com/bmf-san/ggc/.github/workflows/release.yml@refs/tags/{{.Version}}"
              - --certificate-oidc-issuer
              - https://token.actions.githubusercontent.com
              - --signature
              - https://github.com/bmf-san/ggc/releases/download/{{.Version}}/checksums.txt.sig
        overrides:
          - goos: windows
            format: zip
