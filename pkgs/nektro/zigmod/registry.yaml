# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: github_release
    repo_owner: nektro
    repo_name: zigmod
    description: Zig package manager
    version_prefix: "r"
    version_constraint: "false"
    version_overrides:
      - version_constraint: semver("<= 100")
        asset: zigmod-{{.Arch}}-{{.OS}}
        format: raw
        replacements:
          amd64: x86_64
          arm64: aarch64
          darwin: macos
      - version_constraint: "true"
        asset: zigmod-{{.Arch}}-{{.OS}}
        format: raw
        replacements:
          amd64: x86_64
          arm64: aarch64
          darwin: macos
        supported_envs:
          - darwin
          - linux
