packages:
  - name: envoyproxy/gateway/envoy-gateway
    type: github_release
    repo_owner: envoyproxy
    repo_name: gateway
    asset: envoy-gateway_{{.Version}}_{{.OS}}_{{.Arch}}.tar.gz
    format: tar.gz
    version_prefix: v
    description: Envoy Gateway control plane binary
    version_constraint: semver("< 1.2.0")
    no_asset: true
    version_overrides:
      - version_constraint: semver(">= 1.2.0")
        files:
          - name: envoy-gateway
            src: bin/{{.OS}}/{{.Arch}}/envoy-gateway
        supported_envs:
          - darwin
          - linux
