# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: github_release
    repo_owner: jdx
    repo_name: fnox
    description: encrypted/remote secret manager
    asset: fnox-{{.Arch}}-{{.OS}}.{{.Format}}
    format: tar.gz
    replacements:
      amd64: x86_64
      arm64: aarch64
      darwin: apple-darwin
      linux: unknown-linux-gnu
      windows: pc-windows-msvc
    overrides:
      - goos: windows
        format: zip
      - goos: linux
        variants:
          - key: libc
            value: glibc
      - goos: linux
        replacements:
          linux: unknown-linux-musl
        variants:
          - key: libc
            value: musl
    supported_envs:
      - linux
      - darwin
      - windows
    github_immutable_release: true
