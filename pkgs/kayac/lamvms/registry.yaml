# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: github_release
    repo_owner: kayac
    repo_name: lamvms
    description: lamvms is a deployment and lifecycle management tool for AWS Lambda MicroVMs
    version_constraint: "false"
    version_overrides:
      - version_constraint: "true"
        asset: lamvms_{{.Version}}_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        checksum:
          type: github_release
          asset: checksums.txt
          algorithm: sha256
        supported_envs:
          - linux
          - darwin
