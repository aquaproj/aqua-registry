# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: github_release
    repo_owner: GitTools
    repo_name: GitVersion
    aliases:
      - name: gittools/gitversion
    description: From git log to SemVer in no time
    files:
      - name: gitversion
    version_constraint: "false"
    version_overrides:
      - version_constraint: semver("<= 6.0.3")
        asset: gitversion-{{.OS}}-{{.Arch}}-{{.Version}}.{{.Format}}
        format: tar.gz
        supported_envs:
          - linux
          - darwin
          - windows
        replacements:
          amd64: x64
          darwin: osx
          windows: win
        overrides:
          - goos: windows
            format: zip
        checksum:
          enabled: false
      - version_constraint: "true"
        asset: gitversion-{{.OS}}-{{.Arch}}-{{.Version}}.{{.Format}}
        format: tar.gz
        supported_envs:
          - linux
          - darwin
          - windows
        replacements:
          amd64: x64
          darwin: osx
          windows: win
        overrides:
          - goos: windows
            format: zip
        checksum:
          enabled: false
        github_artifact_attestations:
          signer_workflow: GitTools/GitVersion/\.github/workflows/ci\.yml
