# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: github_release
    repo_owner: bitwarden
    repo_name: clients
    description: Bitwarden CLI
    version_prefix: cli-v
    files:
      - name: bw
    version_constraint: "false"
    version_overrides:
      - version_constraint: semver("<= 2025.1.3")
        asset: bw-{{.OS}}-{{.SemVer}}.{{.Format}}
        format: zip
        replacements:
          darwin: macos
        checksum:
          type: github_release
          asset: bw-{{.OS}}-sha256-{{.SemVer}}.txt
          algorithm: sha256
        supported_envs:
          - darwin
          - windows
          - amd64
      - version_constraint: semver("<= 2025.5.0")
        asset: bw-{{.OS}}-{{.SemVer}}.{{.Format}}
        format: zip
        replacements:
          darwin: macos
        checksum:
          type: github_release
          asset: bw-{{.OS}}-sha256-{{.SemVer}}.txt
          algorithm: sha256
        overrides:
          - goos: darwin
            goarch: arm64
            asset: bw-{{.OS}}-{{.Arch}}-{{.SemVer}}.{{.Format}}
            checksum:
              type: github_release
              asset: bw-{{.OS}}-{{.Arch}}-sha256-{{.SemVer}}.txt
              algorithm: sha256
        supported_envs:
          - darwin
          - windows
          - amd64
      - version_constraint: semver("<= 2026.1.0")
        asset: bw-{{.OS}}-{{.SemVer}}.{{.Format}}
        format: zip
        replacements:
          darwin: macos
        overrides:
          - goos: darwin
            goarch: arm64
            asset: bw-{{.OS}}-{{.Arch}}-{{.SemVer}}.{{.Format}}
        supported_envs:
          - darwin
          - windows
          - amd64
      - version_constraint: "true"
        asset: bw-{{.OS}}-{{.SemVer}}.{{.Format}}
        format: zip
        replacements:
          darwin: macos
        overrides:
          - goos: linux
            goarch: arm64
            asset: bw-{{.OS}}-{{.Arch}}-{{.SemVer}}.{{.Format}}
          - goos: darwin
            goarch: arm64
            asset: bw-{{.OS}}-{{.Arch}}-{{.SemVer}}.{{.Format}}
