# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: github_release
    repo_owner: AOMediaCodec
    repo_name: libavif
    description: "libavif - Library for encoding and decoding .avif files"
    version_constraint: "false"
    version_overrides:
      - version_constraint: Version == "v1.0.4"
        asset: libavif-{{.Version}}-avifenc-avifdec-{{.OS}}.{{.Format}}
        format: zip
        supported_envs:
          - windows/amd64
      - version_constraint: semver("<= 0.9.0")
        asset: avifdec
        format: raw
        supported_envs:
          - windows/amd64
      - version_constraint: semver("<= 1.0.3")
        no_asset: true
      - version_constraint: semver("<= 1.1.1")
        asset: "{{.OS}}-artifacts.{{.Format}}"
        format: zip
        supported_envs:
          - windows/amd64
      - version_constraint: "true"
        asset: "{{.OS}}-artifacts.{{.Format}}"
        format: zip
        replacements:
          darwin: macOS
        supported_envs:
          - darwin
          - windows
          - amd64
