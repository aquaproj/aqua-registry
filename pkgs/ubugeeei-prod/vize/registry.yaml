# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: github_release
    repo_owner: ubugeeei-prod
    repo_name: vize
    aliases:
      - name: ubugeeei/vize
    description: Unofficial High-Performance Vue.js Toolchain in Rust
    search_words:
      - vue
    version_constraint: "false"
    version_overrides:
      - version_constraint: "true"
        asset: vize-{{.Arch}}-{{.OS}}.{{.Format}}
        format: tar.gz
        replacements:
          amd64: x86_64
          arm64: aarch64
          darwin: apple-darwin
          linux: unknown-linux-gnu
          windows: pc-windows-msvc
        overrides:
          - goos: windows
            format: zip
        cosign:
          bundle:
            type: github_release
            asset: "{{.Asset}}.cosign.bundle"
          opts:
            - --certificate-identity
            - https://github.com/ubugeeei-prod/vize/.github/workflows/release.yml@refs/tags/{{.Version}}
            - --certificate-oidc-issuer
            - https://token.actions.githubusercontent.com
