---
name: test (workflow_call)
on: workflow_call
permissions: {}
env:
  AQUA_LOG_COLOR: always
jobs:
  path-filter:
    # Get changed files to filter jobs
    outputs:
      renovate-config-validator: ${{steps.changes.outputs.renovate-config-validator}}
      check-files: ${{steps.changes.outputs.check-files}}
      json-schema: ${{steps.changes.outputs.json-schema}}
      test-docker: ${{steps.changes.outputs.test-docker}}
      pkgs-files_files: ${{steps.changes.outputs.pkgs-files_files}}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    timeout-minutes: 15
    steps:
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: changes
        with:
          list-files: shell
          filters: |
            renovate-config-validator:
              - renovate.json5
              - .github/workflows/wc-renovate-config-validator.yaml
            check-files:
              - pkgs/**/pkg.yaml
              - pkgs/**/registry.yaml
              - .github/workflows/wc-check-files.yaml
            pkgs-files:
              - added|modified: pkgs/**/pkg.yaml
              - added|modified: pkgs/**/registry.yaml
            json-schema:
              - registry.yaml
              - .github/workflows/wc-json-schema.yaml
            test-docker:
              - docker/*
              - scripts/**
              - .github/workflows/wc-test-docker.yaml

  renovate-config-validator:
    uses: ./.github/workflows/wc-renovate-config-validator.yaml
    needs: path-filter
    if: ${{needs.path-filter.outputs.renovate-config-validator == 'true'}}
    permissions:
      contents: read

  check-files:
    uses: ./.github/workflows/wc-check-files.yaml
    needs: path-filter
    if: ${{needs.path-filter.outputs.check-files == 'true'}}
    permissions:
      contents: read

  json-schema:
    uses: ./.github/workflows/wc-json-schema.yaml
    needs: path-filter
    if: ${{needs.path-filter.outputs.json-schema == 'true'}}
    permissions:
      contents: read

  lint:
    if: ${{needs.path-filter.outputs.pkgs-files_files != ''}}
    uses: ./.github/workflows/wc-lint.yaml
    needs: path-filter
    permissions:
      contents: read
    with:
      files: ${{needs.path-filter.outputs.pkgs-files_files}}

  test-docker:
    uses: ./.github/workflows/wc-test-docker.yaml
    needs: path-filter
    if: ${{needs.path-filter.outputs.test-docker == 'true'}}
    permissions:
      contents: read

  lintnet:
    uses: ./.github/workflows/wc-lintnet.yaml
    permissions:
      contents: read

  test:
    uses: ./.github/workflows/wc-test.yaml
    permissions:
      contents: read
      pull-requests: read
