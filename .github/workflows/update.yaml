---
name: Update packages by aqua-registry-updater
on:
  workflow_dispatch:
    inputs:
      package:
        type: string
        description: "Package name"
        default: ""
        required: false
  schedule:
    - cron: "*/10 * * * *"

env:
  AQUA_GLOBAL_CONFIG: ${{ github.workspace }}/aqua-all.yaml
  AQUA_LOG_COLOR: always
  AQUA_CONFIG: ${{ github.workspace }}/aqua/update.yaml

jobs:
  update-pkgs:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: aquaproj/aqua-installer@11dd79b4e498d471a9385aa9fb7f62bb5f52a73c # v4.0.4
        with:
          aqua_version: v2.60.1
          policy_allow: "true"
          aqua_opts: -l -a
        env:
          AQUA_GITHUB_TOKEN: ${{github.token}}
      - name: Generate token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: token
        with:
          client-id: ${{vars.APP_CLIENT_ID}}
          private-key: ${{secrets.APP_PRIVATE_KEY}}
          permission-contents: write
          permission-pull-requests: write
      - run: aqua-registry-updater
        if: inputs.package == ''
        env:
          AQUA_REGISTRY_UPDATER_CONTAINER_REGISTRY_TOKEN: ${{github.token}}
          GITHUB_TOKEN: ${{steps.token.outputs.token}}

      - run: aqua-registry-updater "$PKG"
        if: inputs.package != ''
        env:
          AQUA_REGISTRY_UPDATER_CONTAINER_REGISTRY_TOKEN: ${{github.token}}
          GITHUB_TOKEN: ${{steps.token.outputs.token}}
          PKG: ${{inputs.package}}
