---
name: wc-test
on: workflow_call
env:
  AQUA_LOG_COLOR: always
jobs:
  test:
    strategy:
      matrix:
        env:
          - runs-on: windows-latest
            goos: ""
            goarch: ""
          - runs-on: ubuntu-24.04
            goos: ""
            goarch: ""
          - runs-on: macos-15-intel
            goos: ""
            goarch: ""
          - runs-on: ubuntu-24.04-arm
            goos: ""
            goarch: ""
          - runs-on: macos-14
            goos: ""
            goarch: ""
          - runs-on: windows-latest
            goos: ""
            goarch: arm64
    runs-on: ${{ matrix.env.runs-on }}
    defaults:
      run:
        shell: bash
    env:
      AQUA_CONFIG: aqua/test.yaml
    permissions:
      contents: read
      pull-requests: read
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: suzuki-shunsuke/ci-info-action/restore@ceeb10dd50cd632db31e7eccf92cbbb6856f3191 # v0.1.3

      # - name: Generate token
      #   id: generate_token
      #   uses: tibdex/github-app-token@v1
      #   with:
      #     app_id: ${{ secrets.APP_ID }}
      #     private_key: ${{ secrets.APP_PRIVATE_KEY }}
      - uses: aquaproj/aqua-installer@11dd79b4e498d471a9385aa9fb7f62bb5f52a73c # v4.0.4
        with:
          aqua_version: v2.57.2
          policy_allow: "true"
        env:
          AQUA_GITHUB_TOKEN: ${{github.token}}

      - uses: aquaproj/registry-action/test@63f797c47a1c66ecf7a4bc4e07eb41360249190a # v0.2.4
        with:
          goos: ${{ matrix.env.goos }}
          goarch: ${{ matrix.env.goarch }}
          go_version: "1.26.2"
        env:
          GITHUB_TOKEN: ${{github.token}}
